spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: jeni-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/jeni}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:3000}
  security:
    jwt:
      issuer: ${JWT_ISSUER:jeni-backend}
      secret: ${JWT_SECRET:change-me-please-change-me-please-change-me}
      access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh:
      token-days: ${REFRESH_TOKEN_DAYS:14}
      cookie-name: ${REFRESH_COOKIE_NAME:jeni_refresh_token}
      cookie-same-site: ${REFRESH_COOKIE_SAME_SITE:auto}
      cookie-secure: ${REFRESH_COOKIE_SECURE:auto}
    admin:
      email: ${ADMIN_EMAIL:}
      password: ${ADMIN_PASSWORD:}
      full-name: ${ADMIN_FULL_NAME:Jeni Admin}
  storage:
    endpoint: ${DO_SPACES_ENDPOINT:}
    region: ${DO_SPACES_REGION:nyc3}
    bucket: ${DO_SPACES_BUCKET:}
    access-key: ${DO_SPACES_ACCESS_KEY:}
    secret-key: ${DO_SPACES_SECRET_KEY:}
